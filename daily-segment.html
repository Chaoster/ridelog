<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日记录 - RideLog</title>
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body class="page-no-nav" style="padding-bottom:20px;">
  <!-- Page Header -->
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">&#8249;</button>
    <div class="page-title" id="page-title">每日记录</div>
    <button id="delete-btn" style="display:none;margin-left:auto;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:#e74c3c;font-size:13px;cursor:pointer;" onclick="showDeleteModal()">删除</button>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-title">删除记录</div>
      <div class="modal-desc">确定要删除这条每日记录吗？此操作不可恢复。</div>
      <div class="action-row" style="margin:0;">
        <button class="btn btn-secondary" onclick="document.getElementById('delete-modal').classList.remove('active')">取消</button>
        <button class="btn btn-accent" onclick="confirmDeleteSegment()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Day Badge -->
  <div style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:16px 20px;text-align:center;">
    <div style="font-size:12px;opacity:0.9;">JOURNEY DAY</div>
    <div style="font-size:36px;font-weight:800;" id="day-number">1</div>
    <div style="font-size:14px;" id="journey-name">新旅程</div>
  </div>

  <!-- Date Picker -->
  <div class="form-group" style="margin-top:16px;">
    <label class="form-label">日期</label>
    <input type="date" class="form-input" id="date-input" style="max-width:100%;min-width:0;">
  </div>

  <!-- Daily Note -->
  <div class="form-group">
    <label class="form-label">今日笔记</label>
    <textarea class="form-textarea" id="note-input" placeholder="记录今天的骑行见闻、风景、心情..."></textarea>
  </div>

  <!-- Photos Upload -->
  <div class="section">
    <div class="section-title">照片记录 <span style="font-weight:400;color:var(--text-secondary);">(自动读取GPS位置)</span></div>
    <div class="photo-grid" id="photo-grid">
      <div class="photo-add" onclick="document.getElementById('photo-input').click()">+</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="handlePhotos(event)">
    <div style="font-size:12px;color:var(--text-secondary);padding:0 20px;margin-top:4px;">
      点击 + 上传照片，照片将标记在地图上对应的位置
    </div>
  </div>

  <!-- GPX Upload -->
  <div class="section">
    <div class="section-title">GPX 路线文件</div>
    <div class="upload-area" onclick="document.getElementById('gpx-input').click()">
      <div class="upload-icon">&#128220;</div>
      <div class="upload-text">点击上传今日 GPX 路线文件</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">支持 .gpx 格式</div>
    </div>
    <input type="file" id="gpx-input" accept=".gpx" style="display:none;" onchange="handleGPX(event)">
    <div id="gpx-preview"></div>
  </div>

  <!-- Route Preview Map -->
  <div class="section" id="route-section" style="display:none;">
    <div class="section-title">路线预览</div>
    <div class="map-container" id="map-wrap" style="position:relative;">
      <div id="map" style="height:280px;"></div>
      <button id="map-fs-btn" style="position:absolute;top:8px;right:8px;z-index:500;padding:6px 12px;border-radius:6px;border:none;background:rgba(0,0,0,0.6);color:white;font-size:13px;cursor:pointer;" onclick="toggleMapFullscreen()">全屏</button>
    </div>
  </div>

  <!-- Elevation Profile -->
  <div class="section" id="elevation-section" style="display:none;">
    <div class="section-title">海拔剖面</div>
    <div class="elevation-chart-wrap" id="elevation-chart-wrap">
      <canvas id="elevation-chart"></canvas>
      <div id="elevation-missing" style="display:none;padding:24px 12px;text-align:center;color:var(--text-secondary);font-size:13px;line-height:1.6;">
        原始 GPX 未保留逐点海拔数据，无法绘制海拔剖面。<br>
        可重新上传该 GPX 文件以恢复海拔剖面。
      </div>
    </div>
  </div>

  <!-- Today's Stats -->
  <div class="section" id="stats-section" style="display:none;">
    <div class="section-title">今日数据</div>
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="stat-dist">-</div>
        <div class="stat-label">里程(km)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-elev">-</div>
        <div class="stat-label">爬升(m)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-time">-</div>
        <div class="stat-label">用时</div>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-row" style="margin-top:24px;">
    <button class="btn btn-secondary" onclick="history.back()">放弃</button>
    <button class="btn btn-primary" onclick="saveSegment()">保存本日</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
  <script src="js/journey-service.js"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    const dayNum = urlParams.get('day') || '1';
    const journeyId = urlParams.get('journeyId') || '';
    const journeyName = decodeURIComponent(urlParams.get('journey') || '新旅程');
    const isEdit = urlParams.get('edit') === '1';
    const editIdx = parseInt(urlParams.get('idx') || '-1');

    document.getElementById('day-number').textContent = dayNum;
    document.getElementById('journey-name').textContent = journeyName;

    // Init variables and map first (before edit mode prefill)
    const map = L.map('map').setView([36.95, 100.90], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let photos = [];
    let gpxPoints = [];
    let rawGpxPoints = [];
    let gpxDists = [];
    let routeLine = null;
    let photoMarkers = [];
    let startMarker = null;
    let endMarker = null;
    let hoverMarker = null;
    let pinSize = 36;
    let routeWeight = 4;
    let currentElevGain = 0;
    let currentElevLoss = 0;
    let currentDistance = 0;
    let currentDurationHours = 0;

    // Load journey data
    let journey = null;
    let existingSeg = null;

    async function loadJourney() {
      if (!journeyId) {
        alert('缺少 journeyId');
        location.href = 'my-records.html';
        return;
      }

      try {
        journey = await window.journeyService.getJourney(journeyId);
      } catch (err) {
        console.error('[daily-segment] load journey error:', err);
      }

      if (!journey) {
        alert('旅程不存在');
        location.href = 'my-records.html';
        return;
      }

      if (journey.title) {
        document.getElementById('journey-name').textContent = journey.title;
      }

      // Default date to today for new segments; edit mode overrides below
      document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

      if (isEdit && editIdx >= 0 && journey && journey.segments && journey.segments[editIdx]) {
      existingSeg = journey.segments[editIdx];
      document.getElementById('page-title').textContent = '编辑记录';
      document.getElementById('delete-btn').style.display = 'block';

      // Prefill form
      document.getElementById('date-input').value = existingSeg.date || '';
      document.getElementById('note-input').value = existingSeg.note || '';

      // Prefill photos — prefer stored photos with GPS data
      const photoList = (existingSeg.photos && existingSeg.photos.length > 0)
        ? existingSeg.photos
        : (existingSeg.photoUrls || []).map(url => ({ url, lat: 0, lng: 0, name: 'photo' }));
      if (photoList.length > 0) {
        const grid = document.getElementById('photo-grid');
        const addBtn = grid.querySelector('.photo-add');
        photoList.forEach((p, i) => {
          photos.push({ url: p.url, lat: p.lat || 0, lng: p.lng || 0, name: p.name || 'photo' });
          const div = document.createElement('div');
          div.className = 'photo-item';
          div.dataset.idx = i;
          div.style.position = 'relative';
          div.innerHTML = `
            <img src="${p.url}" data-fullscreen="${p.url}">
            <div style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;z-index:2;" onclick="removePhoto(this)">×</div>
          `;
          grid.insertBefore(div, addBtn);
        });
      }

      // Prefill GPX route
      if (existingSeg.gpxPoints && existingSeg.gpxPoints.length > 0) {
        // Normalize stored points: may be old [lat,lon] arrays, [lat,lon,ele] arrays, or {lat,lon,ele} objects
        gpxPoints = existingSeg.gpxPoints.map(p => {
          if (Array.isArray(p)) {
            return [p[0], p[1], p[2] != null ? p[2] : null];
          }
          return [p.lat, p.lon, p.ele != null ? p.ele : null];
        });
        rawGpxPoints = gpxPoints.map(p => ({ lat: p[0], lon: p[1], ele: p[2] }));

        let totalDist = 0;
        gpxDists = [0];
        for (let i = 1; i < rawGpxPoints.length; i++) {
          totalDist += haversine(rawGpxPoints[i - 1].lat, rawGpxPoints[i - 1].lon, rawGpxPoints[i].lat, rawGpxPoints[i].lon);
          gpxDists.push(totalDist);
        }

        drawRouteOnMap();
        document.getElementById('gpx-preview').innerHTML = `
          <div class="gpx-file">
            <span class="gpx-icon">&#128220;</span>
            <div>
              <div class="gpx-name">${existingSeg.distance > 0 ? Math.round(existingSeg.distance) : '-'} km 路线</div>
              <div style="font-size:12px;color:var(--text-secondary);">${gpxPoints.length} 个轨迹点</div>
            </div>
            <span class="gpx-status">&#10003; 已上传</span>
          </div>
        `;

        // Show stats and stats values from existing data
        document.getElementById('route-section').style.display = 'block';
        document.getElementById('stats-section').style.display = 'block';
        document.getElementById('stat-dist').textContent = existingSeg.distance > 0 ? Math.round(existingSeg.distance) : '-';
        document.getElementById('stat-elev').textContent = formatElev(existingSeg.elevation || 0, existingSeg.elevationLoss || 0);
        document.getElementById('stat-time').textContent = existingSeg.duration || '-';

        currentDistance = existingSeg.distance || 0;
        currentElevGain = existingSeg.elevation || 0;
        currentElevLoss = existingSeg.elevationLoss || 0;

        const hasEle = rawGpxPoints.some(p => p.ele != null && !isNaN(p.ele));
        const canvas = document.getElementById('elevation-chart');
        const missingEl = document.getElementById('elevation-missing');
        if (hasEle) {
          document.getElementById('elevation-section').style.display = 'block';
          canvas.style.display = 'block';
          missingEl.style.display = 'none';
          drawElevationChart(rawGpxPoints, gpxDists);
        } else if (currentElevGain > 0) {
          // Per-point elevation is missing but summary stat exists; show a note so the section isn't silently absent
          document.getElementById('elevation-section').style.display = 'block';
          canvas.style.display = 'none';
          missingEl.style.display = 'block';
        } else {
          document.getElementById('elevation-section').style.display = 'none';
          canvas.style.display = 'block';
          missingEl.style.display = 'none';
        }

        setTimeout(() => { map.invalidateSize(); redistributePhotos(); }, 100);
      }

      redistributePhotos();
      }
    }

    loadJourney();

    function compressImage(dataUrl, maxWidth = 1200, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxWidth) {
            h = Math.round(h * maxWidth / w);
            w = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    function randomSuffix() {
      return Math.random().toString(36).slice(2, 6);
    }

    async function uploadSegmentPhoto(blob) {
      const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
      if (userError || !user) throw new Error('未登录，无法上传照片');
      if (!journeyId) throw new Error('缺少 journeyId');

      const fileName = `${user.id}/${journeyId}/${dayNum}/${Date.now()}_${randomSuffix()}.jpg`;
      const { error: uploadError } = await supabaseClient.storage
        .from('segment-photos')
        .upload(fileName, blob, { contentType: 'image/jpeg' });

      if (uploadError) throw uploadError;

      const { data: { publicUrl } } = supabaseClient.storage
        .from('segment-photos')
        .getPublicUrl(fileName);

      return publicUrl;
    }

    function addPhotoMarker(photo) {
      const s = pinSize;
      const icon = L.divIcon({
        className: 'photo-pin',
        html: `<img src="${photo.url}" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">`,
        iconSize: [s, s],
        iconAnchor: [s / 2, s]
      });
      const marker = L.marker([photo.lat, photo.lng], { icon }).addTo(map);
      marker.on('click', () => {
        const overlay = document.querySelector('.fullscreen-overlay');
        if (overlay) {
          overlay.querySelector('img').src = photo.url;
          overlay.classList.add('active');
        }
      });
      photoMarkers.push(marker);
    }

    function clearPhotoMarkers() {
      photoMarkers.forEach(m => map.removeLayer(m));
      photoMarkers = [];
    }

    function redistributePhotos() {
      if (photos.length === 0) return;
      clearPhotoMarkers();

      // Photos with real GPS: display at exact position, do NOT snap to route
      photos.forEach(p => {
        if (p.lat !== 0 || p.lng !== 0) {
          addPhotoMarker(p);
        }
      });

      // Photos without GPS: fallback — distribute along route
      const noGpsPhotos = photos.filter(p => p.lat === 0 && p.lng === 0);
      if (noGpsPhotos.length > 0) {
        if (gpxPoints.length > 0) {
          const minPx = pinSize * 1.5;
          function isTooClose(lat, lng) {
            const pt = map.latLngToContainerPoint([lat, lng]);
            for (const m of photoMarkers) {
              const mPt = map.latLngToContainerPoint(m.getLatLng());
              const dx = pt.x - mPt.x, dy = pt.y - mPt.y;
              if (Math.sqrt(dx * dx + dy * dy) < minPx) return true;
            }
            return false;
          }
          function findOnRoute(baseIdx) {
            if (!isTooClose(gpxPoints[baseIdx][0], gpxPoints[baseIdx][1])) {
              return [gpxPoints[baseIdx][0], gpxPoints[baseIdx][1]];
            }
            for (let step = 1; step < gpxPoints.length; step++) {
              for (const dir of [-1, 1]) {
                const idx = baseIdx + dir * step;
                if (idx >= 0 && idx < gpxPoints.length) {
                  const lat = gpxPoints[idx][0], lng = gpxPoints[idx][1];
                  if (!isTooClose(lat, lng)) return [lat, lng];
                }
              }
            }
            return [gpxPoints[baseIdx][0], gpxPoints[baseIdx][1]];
          }
          noGpsPhotos.forEach((p, i) => {
            const ratio = noGpsPhotos.length <= 1 ? 0 : i / (noGpsPhotos.length - 1);
            const baseIdx = Math.min(Math.floor(ratio * (gpxPoints.length - 1)), gpxPoints.length - 1);
            const [lat, lng] = findOnRoute(baseIdx);
            // Don't mutate original — no-GPS photos keep lat:0, lng:0 for saving
            addPhotoMarker({ ...p, lat, lng });
          });
        } else {
          const baseLat = 36.95, baseLng = 100.90;
          noGpsPhotos.forEach((p, i) => {
            const lat = baseLat + (Math.random() - 0.5) * 0.3;
            const lng = baseLng + (Math.random() - 0.5) * 0.3;
            addPhotoMarker({ ...p, lat, lng });
          });
        }
      }

      if (routeLine) {
        map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
      } else if (photoMarkers.length > 0) {
        map.fitBounds(photoMarkers.map(m => m.getLatLng()), { padding: [40, 40] });
      }
    }

    function toggleMapFullscreen() {
      const wrap = document.getElementById('map-wrap');
      const btn = document.getElementById('map-fs-btn');
      const isFs = wrap.classList.contains('map-fullscreen');
      if (!isFs) {
        wrap.classList.add('map-fullscreen');
        wrap.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1000;background:#fff;padding:0;margin:0;border-radius:0;';
        document.getElementById('map').style.height = '100%';
        btn.textContent = '退出全屏';
        btn.style.top = '12px';
        btn.style.right = '12px';
        pinSize = 56;
        routeWeight = 8;
      } else {
        wrap.classList.remove('map-fullscreen');
        wrap.style.cssText = 'position:relative;';
        document.getElementById('map').style.height = '280px';
        btn.textContent = '全屏';
        btn.style.top = '8px';
        btn.style.right = '8px';
        pinSize = 36;
        routeWeight = 4;
      }
      drawRouteOnMap();
      redistributePhotos();
      setTimeout(() => map.invalidateSize(), 100);
    }

    function removePhoto(btn) {
      const item = btn.parentElement;
      const idx = parseInt(item.dataset.idx);
      if (isNaN(idx) || idx < 0 || idx >= photos.length) return;
      photos.splice(idx, 1);
      item.remove();
      document.querySelectorAll('.photo-item').forEach((el, i) => { el.dataset.idx = i; });
      redistributePhotos();
    }

    async function handlePhotos(e) {
      const files = Array.from(e.target.files);
      const grid = document.getElementById('photo-grid');

      for (const file of files) {
        // Read GPS first (from original file, before compression)
        const gps = await getPhotoGPS(file);

        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (ev) => resolve(ev.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        const compressedUrl = await compressImage(dataUrl, 1200, 0.7);

        let url = compressedUrl;
        try {
          const blob = await dataUrlToBlob(compressedUrl);
          url = await uploadSegmentPhoto(blob);
        } catch (err) {
          console.error('上传照片失败，使用本地 base64:', err);
          alert('照片上传失败，将临时保存在本地。建议检查网络后重新保存本日记录。');
        }

        photos.push({ url, lat: gps.lat || 0, lng: gps.lng || 0, name: file.name });

        const addBtn = grid.querySelector('.photo-add');
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.dataset.idx = photos.length - 1;
        div.style.position = 'relative';
        div.innerHTML = `
          <img src="${url}" data-fullscreen="${url}">
          <div style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;z-index:2;" onclick="removePhoto(this)">×</div>
        `;
        grid.insertBefore(div, addBtn);
      }

      redistributePhotos();
    }

    // Haversine formula
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function parseGPXFull(gpxText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(gpxText, 'text/xml');
      const points = [];
      doc.querySelectorAll('trkpt').forEach(pt => {
        const eleEl = pt.querySelector('ele');
        const timeEl = pt.querySelector('time');
        points.push({
          lat: parseFloat(pt.getAttribute('lat')),
          lon: parseFloat(pt.getAttribute('lon')),
          ele: eleEl ? parseFloat(eleEl.textContent) : null,
          time: timeEl ? new Date(timeEl.textContent) : null
        });
      });
      return points;
    }

    function drawRouteOnMap() {
      if (routeLine) map.removeLayer(routeLine);
      if (startMarker) map.removeLayer(startMarker);
      if (endMarker) map.removeLayer(endMarker);

      routeLine = L.polyline(gpxPoints, {
        color: '#FF7B3D',
        weight: routeWeight,
        opacity: 0.85
      }).addTo(map);

      const startIcon = L.divIcon({
        className: '',
        html: '<div style="width:28px;height:28px;border-radius:50%;background:#2ecc71;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">起</div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
      const endIcon = L.divIcon({
        className: '',
        html: '<div style="width:28px;height:28px;border-radius:50%;background:#e74c3c;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">终</div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
      startMarker = L.marker(gpxPoints[0], { icon: startIcon, zIndexOffset: 1000 }).addTo(map);
      endMarker = L.marker(gpxPoints[gpxPoints.length - 1], { icon: endIcon, zIndexOffset: 1000 }).addTo(map);
    }

    function showHoverMarker(point) {
      if (!point) return;
      if (hoverMarker) {
        hoverMarker.setLatLng([point.lat, point.lon]);
      } else {
        hoverMarker = L.circleMarker([point.lat, point.lon], {
          radius: 6,
          fillColor: '#FF7B3D',
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.9
        }).addTo(map);
      }
    }

    function hideHoverMarker() {
      if (hoverMarker) {
        map.removeLayer(hoverMarker);
        hoverMarker = null;
      }
    }

    function drawElevationChart(points, dists) {
      const canvas = document.getElementById('elevation-chart');
      const missingEl = document.getElementById('elevation-missing');
      if (missingEl) missingEl.style.display = 'none';
      canvas.style.display = 'block';
      const wrap = canvas.parentElement;
      const dpr = window.devicePixelRatio || 1;
      const width = wrap.clientWidth - 24;
      const height = 180;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const pad = { top: 20, right: 10, bottom: 28, left: 44 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;

      const eles = points.map(p => p.ele).filter(e => e != null);
      if (eles.length === 0) {
        document.getElementById('elevation-section').style.display = 'none';
        return;
      }

      const minEle = Math.min(...eles);
      const maxEle = Math.max(...eles);
      const eleRange = Math.max(maxEle - minEle, 1);
      const maxDist = dists[dists.length - 1] || 0;

      ctx.clearRect(0, 0, width, height);

      // Grid lines
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + chartW, y);
        ctx.stroke();
      }

      // Elevation area
      const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
      gradient.addColorStop(0, 'rgba(255,123,61,0.35)');
      gradient.addColorStop(1, 'rgba(255,123,61,0.05)');

      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + chartH);
      points.forEach((p, i) => {
        if (p.ele == null) return;
        const x = pad.left + (maxDist > 0 ? (dists[i] / maxDist) * chartW : 0);
        const y = pad.top + chartH - ((p.ele - minEle) / eleRange) * chartH;
        ctx.lineTo(x, y);
      });
      ctx.lineTo(pad.left + chartW, pad.top + chartH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Elevation line
      ctx.beginPath();
      ctx.strokeStyle = '#FF7B3D';
      ctx.lineWidth = 2;
      let started = false;
      points.forEach((p, i) => {
        if (p.ele == null) return;
        const x = pad.left + (maxDist > 0 ? (dists[i] / maxDist) * chartW : 0);
        const y = pad.top + chartH - ((p.ele - minEle) / eleRange) * chartH;
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();

      // Y-axis labels (elevation)
      ctx.fillStyle = 'var(--text-secondary)';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let i = 0; i <= 4; i++) {
        const val = minEle + (eleRange / 4) * (4 - i);
        const y = pad.top + (chartH / 4) * i;
        ctx.fillText(Math.round(val) + 'm', pad.left - 8, y);
      }

      // X-axis labels (distance)
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let i = 0; i <= 4; i++) {
        const val = (maxDist / 4) * i;
        const x = pad.left + (chartW / 4) * i;
        ctx.fillText(Math.round(val) + 'km', x, pad.top + chartH + 8);
      }

      // Interaction: hover/touch on chart to highlight map position
      function handleChartMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        if (x < pad.left || x > width - pad.right) return;
        const ratio = (x - pad.left) / chartW;
        const idx = Math.min(points.length - 1, Math.max(0, Math.round(ratio * (points.length - 1))));
        showHoverMarker(points[idx]);
      }

      canvas.onmousemove = (e) => handleChartMove(e.clientX);
      canvas.ontouchmove = (e) => {
        e.preventDefault();
        if (e.touches.length > 0) handleChartMove(e.touches[0].clientX);
      };
      canvas.onmouseleave = () => hideHoverMarker();
      canvas.ontouchend = () => hideHoverMarker();
      canvas.ontouchcancel = () => hideHoverMarker();
    }

    function formatElev(gain, loss) {
      return gain > 0 ? `↑${Math.round(gain)}` : '-';
    }

    function formatDuration(hours) {
      if (!hours) return '';
      const h = Math.floor(hours);
      const m = Math.round((hours - h) * 60);
      if (h > 0 && m > 0) return `${h}h${m}m`;
      if (h > 0) return `${h}h`;
      return `${m}m`;
    }

    function handleGPX(e) {
      const file = e.target.files[0];
      if (!file) return;

      hideHoverMarker();

      const reader = new FileReader();
      reader.onload = (ev) => {
        const rawPoints = parseGPXFull(ev.target.result);
        if (rawPoints.length === 0) {
          alert('未能解析 GPX 文件，请检查文件格式');
          return;
        }

        gpxPoints = rawPoints.map(p => [p.lat, p.lon, p.ele]);
        rawGpxPoints = rawPoints;

        let totalDist = 0;
        const dists = [0];
        for (let i = 1; i < rawPoints.length; i++) {
          totalDist += haversine(rawPoints[i - 1].lat, rawPoints[i - 1].lon, rawPoints[i].lat, rawPoints[i].lon);
          dists.push(totalDist);
        }
        gpxDists = dists;

        let totalElev = 0;
        let totalElevLoss = 0;
        for (let i = 1; i < rawPoints.length; i++) {
          const prev = rawPoints[i - 1].ele;
          const curr = rawPoints[i].ele;
          if (prev != null && curr != null) {
            const diff = curr - prev;
            if (diff > 0) {
              totalElev += diff;
            } else if (diff < 0) {
              totalElevLoss += Math.abs(diff);
            }
          }
        }

        currentDistance = totalDist;
        currentElevGain = totalElev;
        currentElevLoss = totalElevLoss;

        let durationHours = 0;
        const times = rawPoints.filter(p => p.time).map(p => p.time.getTime());
        if (times.length >= 2) {
          const durationMs = Math.max(...times) - Math.min(...times);
          durationHours = durationMs / (1000 * 60 * 60);
        }
        if (durationHours === 0 && totalDist > 0) {
          durationHours = totalDist / 20;
        }
        currentDurationHours = durationHours;

        drawRouteOnMap();

        document.getElementById('route-section').style.display = 'block';
        document.getElementById('elevation-section').style.display = 'block';
        document.getElementById('stats-section').style.display = 'block';

        setTimeout(() => {
          map.invalidateSize();
          map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
        }, 50);

        drawElevationChart(rawPoints, dists);
        document.getElementById('elevation-chart').style.display = 'block';
        document.getElementById('elevation-missing').style.display = 'none';

        document.getElementById('gpx-preview').innerHTML = `
          <div class="gpx-file">
            <span class="gpx-icon">&#128220;</span>
            <div>
              <div class="gpx-name">${file.name}</div>
              <div style="font-size:12px;color:var(--text-secondary);">${rawPoints.length} 个轨迹点</div>
            </div>
            <span class="gpx-status">&#10003; 已解析</span>
          </div>
        `;

        document.getElementById('stat-dist').textContent = Math.round(totalDist);
        document.getElementById('stat-elev').textContent = formatElev(totalElev, totalElevLoss);

        const h = Math.floor(durationHours);
        const m = Math.round((durationHours - h) * 60);
        if (h > 0 && m > 0) {
          document.getElementById('stat-time').textContent = `${h}h${m}m`;
        } else if (h > 0) {
          document.getElementById('stat-time').textContent = `${h}h`;
        } else {
          document.getElementById('stat-time').textContent = `${m}m`;
        }
      };
      reader.readAsText(file);
    }

    async function saveSegment() {
      const saveBtn = document.querySelector('.btn-primary');
      if (saveBtn.disabled) return;
      saveBtn.disabled = true;
      saveBtn.classList.add('btn-loading');

      const date = document.getElementById('date-input').value;
      const note = document.getElementById('note-input').value;

      if (!note.trim()) {
        alert('请填写今日笔记');
        saveBtn.disabled = false;
        saveBtn.classList.remove('btn-loading');
        return;
      }

      const segmentData = {
        day: parseInt(dayNum),
        date: date,
        note: note,
        photoCount: photos.length,
        photos: photos.map(p => ({ url: p.url, lat: p.lat, lng: p.lng })),
        photoUrls: photos.map(p => p.url),
        gpx: gpxPoints.length > 0,
        gpxPoints: gpxPoints,
        distance: Math.round(currentDistance) || 0,
        elevation: Math.round(currentElevGain) || 0,
        elevationLoss: Math.round(currentElevLoss) || 0,
        duration: formatDuration(currentDurationHours)
      };

      try {
        const updated = await window.journeyService.saveSegment(journeyId, segmentData, isEdit ? editIdx : -1);
        const isCompleted = updated.status === 'completed';
        location.href = isCompleted ? `journey-detail.html?id=${journeyId}&from=records` : `ongoing.html?id=${journeyId}`;
      } catch (err) {
        console.error('[daily-segment] save segment error:', err);
        alert('保存失败：' + err.message);
        saveBtn.disabled = false;
        saveBtn.classList.remove('btn-loading');
      }
    }

    function showDeleteModal() {
      if (!isEdit) return;
      document.getElementById('delete-modal').classList.add('active');
    }

    async function confirmDeleteSegment() {
      document.getElementById('delete-modal').classList.remove('active');
      if (!isEdit || editIdx < 0) return;

      try {
        await window.journeyService.deleteSegment(journeyId, editIdx);
        location.href = `ongoing.html?id=${journeyId}`;
      } catch (err) {
        console.error('[daily-segment] delete segment error:', err);
        alert('删除失败：' + err.message);
      }
    }
  </script>
