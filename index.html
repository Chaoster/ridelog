<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RideLog - 旅行日志</title>
  <link rel="stylesheet" href="css/style.css?v=8">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login-modal.js"></script>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <a href="index.html" class="logo-link" aria-label="回到首页">
      <img src="images/logo.png" class="logo" alt="DONKE">
    </a>
    <a href="profile.html" class="avatar" id="header-avatar" aria-label="我的" onclick="event.preventDefault(); requireAuth(() => location.href='profile.html')">
      <svg id="header-avatar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <img id="header-avatar-img" class="hidden" alt="头像">
    </a>
  </div>

  <!-- Feed Cards -->
  <div id="feed-container">
    <div id="feed-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-secondary);font-size:14px;">
      <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:feed-loading-spin 1s linear infinite;"></div>
      <span>加载中...</span>
    </div>
    <style>
      @keyframes feed-loading-spin { to { transform: rotate(360deg); } }
    </style>
  </div>

  <!-- New Journey Modal -->
  <div class="modal-overlay" id="new-journey-modal">
    <div class="modal new-journey-modal">
      <div class="modal-title">开启新的旅程</div>
      <div class="form-group" style="margin: 0 0 20px; text-align: left;">
        <label class="form-label">旅程标题</label>
        <input type="text" class="form-input" id="new-journey-title" placeholder="给你的旅程起个名，例如：环青海湖骑行">
      </div>
      <div class="action-row" style="margin: 0;">
        <button class="btn btn-secondary" onclick="closeNewJourneyModal()">取消</button>
        <button class="btn btn-primary" onclick="createJourneyFromModal()">创建</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      首页
    </a>
    <a href="#" class="nav-cta" onclick="event.preventDefault(); openNewJourneyModal()">+新旅程</a>
    <a href="my-records.html" class="nav-item" onclick="event.preventDefault(); requireAuth(() => location.href='my-records.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      记录
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js?v=14"></script>
  <script src="js/journey-service.js?v=13"></script>
  <script>
    function getCoverUrl(j) {
      if (j.coverUrl) return j.coverUrl;
      const urls = [];
      (j.segments || []).forEach(s => { if (s.photoUrls) urls.push(...s.photoUrls); });
      if (urls.length === 0) return null;
      const hash = String(j.id).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return urls[hash % urls.length];
    }

    function getCoverSvg(j) {
      if (j.coverSvg) return j.coverSvg;
      const segs = j.segments || [];
      for (const s of segs) {
        if (s.routeSvg) return s.routeSvg;
      }
      return null;
    }

    function renderSvgCover(svg, containerId, width = '100%', height = '100%') {
      let svgContent = svg
        .replace(/width="100%"/g, `width="${width}"`)
        .replace(/height="100%"/g, `height="${height}"`);
      if (!svgContent.includes('preserveAspectRatio')) {
        svgContent = svgContent.replace(/<svg/, '<svg preserveAspectRatio="xMidYMid slice"');
      }
      return `
        <div id="${containerId}" style="width:${width};height:${height};border-radius:10px;overflow:hidden;background:#edf3ea;">
          ${svgContent}
        </div>
      `;
    }

    async function renderFeeds() {
      let ongoing = [];
      let completed = [];
      let publicJourneys = [];
      let loadError = null;

      try {
        if (await window.journeyService.isLoggedIn()) {
          [ongoing, completed] = await Promise.all([
            window.journeyService.getJourneys({ status: 'ongoing' }),
            window.journeyService.getJourneys({ status: 'completed' })
          ]);
        } else {
          ongoing = storage.get('ongoingJourneys') || [];
          completed = storage.get('completedJourneys') || [];
        }
        publicJourneys = await window.journeyService.getJourneys({ status: 'completed', publicOnly: true });
      } catch (err) {
        loadError = err;
        console.error('[index] load journeys error:', err);
        ongoing = storage.get('ongoingJourneys') || [];
        completed = storage.get('completedJourneys') || [];
      }

      const myJourneys = [...completed];
      const allFeedJourneys = [...myJourneys, ...publicJourneys.filter(pj => !myJourneys.some(mj => mj.id === pj.id))];

      console.log('[index] renderFeeds', {
        loggedIn: await window.journeyService.isLoggedIn(),
        ongoingCount: ongoing.length,
        completedCount: completed.length,
        publicCount: publicJourneys.length,
        totalFeed: allFeedJourneys.length,
        error: loadError?.message
      });

      const container = document.getElementById('feed-container');

      if (allFeedJourneys.length === 0) {
        const errorDetail = loadError
          ? `<div style="font-size:12px;color:#e74c3c;margin-top:8px;">加载失败：${loadError.message || '未知错误'}</div>`
          : '';
        container.innerHTML = `
          <div style="text-align:center;padding:60px 20px;color:var(--text-secondary);">
            <div style="font-size:16px;margin-bottom:8px;">暂无公开的旅程</div>
            <div style="font-size:14px;">登录并开启你的旅程吧</div>
            ${errorDetail}
          </div>
        `;
        return;
      }

      // Build user journey cards
      const userCards = allFeedJourneys.map(j => {
        const segs = j.segments || [];
        const totalDist = segs.reduce((s, seg) => s + (parseFloat(seg.distance) || 0), 0) || (j.totalDistance || 0);
        const totalElev = segs.reduce((s, seg) => s + (parseFloat(seg.elevation) || 0), 0) || (j.totalElevation || 0);
        const totalDays = segs.length || (j.days || 0);
        const isOwnOngoing = ongoing.some(o => o.id === j.id);
        const isOngoing = j.status === 'ongoing';

        const coverUrl = getCoverUrl(j);
        const coverSvg = getCoverSvg(j);

        let coverHtml;
        if (coverUrl) {
          coverHtml = `<img class="card-image" src="${coverUrl}" alt="${j.title}">`;
        } else if (coverSvg) {
          coverHtml = renderSvgCover(coverSvg, `mini-map-${j.id}`, '100%', '240px').replace('border-radius:10px', 'border-radius:0');
        } else {
          coverHtml = `<img class="card-image" src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=600" alt="${j.title}">`;
        }

        return `
          <div class="card" onclick="location.href='${isOwnOngoing ? 'ongoing' : 'journey-detail'}.html?id=${j.id}&from=index'">
            ${coverHtml}
            <div class="card-content">
              <div class="card-title">${j.title}</div>
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">
                <span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:${isOngoing ? 'rgba(255,123,61,0.15)' : 'rgba(46,204,113,0.15)'};color:${isOngoing ? 'var(--accent-dark)' : '#27ae60'};">${isOngoing ? '进行中' : '已完成'}</span>
              </div>
              <div class="card-meta">
                <span class="card-meta-item">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                  ${totalDays} 天
                </span>
                <span class="card-meta-item">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${totalDist > 0 ? Math.round(totalDist) : '-'} km
                </span>
                <span class="card-meta-item">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 20h18L14 10l-5 7-3-4z"/></svg>
                  ${totalElev > 0 ? '↑' + Math.round(totalElev) + 'm' : '-'}
                </span>
              </div>
            </div>
          </div>
        `;
      });

      // Build sample journey cards
      const sampleCards = SAMPLE_JOURNEYS.map(j => `
        <div class="card" onclick="location.href='journey-detail.html?id=${j.id}&from=index'">
          <img class="card-image" src="${j.cover}" alt="${j.title}">
          <div class="card-content">
            <div class="card-title">${j.title}</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">${j.author}</div>
            <div class="card-meta">
              <span class="card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                ${j.days} 天
              </span>
              <span class="card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${j.distance} ${j.unit}
              </span>
              <span class="card-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${j.date}
              </span>
            </div>
            <div class="route-info">
              <div class="route-dot start"></div>
              <span class="route-label" style="font-size:11px;color:var(--text-secondary);">${j.start}</span>
              <div class="route-line"></div>
              <span class="route-label" style="font-size:11px;color:var(--text-secondary);">${j.end}</span>
              <div class="route-dot end"></div>
            </div>
          </div>
        </div>
      `);

      container.innerHTML = [...userCards, ...sampleCards].join('');
    }

    renderFeeds();
  </script>

  <!-- Supabase connection test -->
  <script>
    async function testSupabaseConnection() {
      if (!window.supabaseClient) {
        console.warn('[Supabase] 客户端未初始化，请先配置 js/supabase-config.js');
        return;
      }
      try {
        const { data, error } = await supabaseClient.from('journeys').select('*').limit(1);
        if (error) throw error;
        console.log('[Supabase] 连接成功， journeys 表读取结果：', data);
      } catch (err) {
        console.error('[Supabase] 连接测试失败：', err.message);
      }
    }
    testSupabaseConnection();
  </script>

  <script>
    async function openNewJourneyModal() {
      if (!window.journeyService) return;
      if (!(await window.journeyService.isLoggedIn())) {
        window.requireAuth && window.requireAuth(async () => {
          document.getElementById('new-journey-modal').classList.add('active');
          document.getElementById('new-journey-title').focus();
        });
        return;
      }
      document.getElementById('new-journey-modal').classList.add('active');
      document.getElementById('new-journey-title').focus();
    }

    function closeNewJourneyModal() {
      document.getElementById('new-journey-modal').classList.remove('active');
      document.getElementById('new-journey-title').value = '';
    }

    async function createJourneyFromModal() {
      const titleInput = document.getElementById('new-journey-title');
      const title = titleInput.value.trim();
      if (!title) {
        alert('请填写旅程标题');
        return;
      }
      try {
        await window.journeyService.createJourney(title);
        closeNewJourneyModal();
        location.href = 'my-records.html';
      } catch (err) {
        alert('创建失败：' + err.message);
      }
    }

    document.getElementById('new-journey-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createJourneyFromModal();
      if (e.key === 'Escape') closeNewJourneyModal();
    });
  </script>
</body>
</html>
