<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>开始新旅程 - RideLog</title>
  <link rel="stylesheet" href="css/style.css?v=8">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login-modal.js"></script>
</head>
<body class="page-no-nav">
  <!-- Page Header -->
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">&#8249;</button>
    <div class="page-title">开始新的旅程</div>
  </div>

  <!-- Form -->
  <div style="padding: 8px 0 0;">
    <div class="form-group" style="margin: 16px 20px 0;">
      <label class="form-label">旅程标题</label>
      <input type="text" class="form-input" id="journey-title" placeholder="给你的旅程起个名字，例如：环青海湖骑行">
    </div>
  </div>

  <!-- Action Buttons -->
  <div style="margin: 20px 20px 0;">
    <button class="btn btn-primary" style="width:100%;" onclick="createJourney()">创建旅程</button>
  </div>

  <script src="js/app.js"></script>
  <script src="js/journey-service.js"></script>
  <script>
    async function createJourney() {
      if (!(await window.journeyService.isLoggedIn())) {
        window.requireAuth(async () => {
          await doCreateJourney();
        });
        return;
      }
      await doCreateJourney();
    }

    async function doCreateJourney() {
      const title = document.getElementById('journey-title').value.trim();
      if (!title) {
        alert('请填写旅程标题');
        return;
      }

      try {
        const journey = await window.journeyService.createJourney(title);
        location.href = 'my-records.html';
      } catch (err) {
        alert('创建失败：' + err.message);
      }
    }
  </script>
</body>
</html>
