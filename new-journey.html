<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>开始新旅程 - RideLog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <!-- Page Header -->
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">&#8249;</button>
    <div class="page-title">开始新的旅程</div>
  </div>

  <!-- Form -->
  <div style="padding: 8px 0;">
    <div class="form-group">
      <label class="form-label">旅程标题</label>
      <input type="text" class="form-input" id="journey-title" placeholder="给你的旅程起个名字，例如：环青海湖骑行">
    </div>
  </div>

  <!-- Action Buttons -->
  <div style="margin: 24px 20px;">
    <button class="btn btn-primary" style="width:100%;" onclick="createJourney()">创建旅程</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    function createJourney() {
      const title = document.getElementById('journey-title').value.trim();
      if (!title) {
        alert('请填写旅程标题');
        return;
      }

      const journey = {
        id: 'j_' + Date.now(),
        title: title,
        createdAt: new Date().toISOString().split('T')[0],
        segments: []
      };

      // Save to ongoing journeys
      let ongoing = storage.get('ongoingJourneys') || [];
      ongoing.unshift(journey);
      storage.set('ongoingJourneys', ongoing);

      // Go back to records page
      location.href = 'my-records.html';
    }
  </script>
</body>
</html>
