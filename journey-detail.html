<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅程总结 - RideLog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .route-path {
      stroke-dasharray: 10;
      animation: dash 2s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
  </style>
</head>
<body>
  <!-- Page Header -->
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <div class="page-title">旅程总结</div>
    <div id="header-actions" style="margin-left:auto;display:flex;gap:8px;"></div>
  </div>

  <!-- Modal: Delete Confirmation -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-title">删除旅程</div>
      <div class="modal-desc">确定要删除这篇旅程总结吗？此操作不可恢复。</div>
      <div class="action-row" style="margin:0;">
        <button class="btn btn-secondary" onclick="document.getElementById('delete-modal').classList.remove('active')">取消</button>
        <button class="btn btn-accent" onclick="confirmDelete()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Cover Map -->
  <div id="cover-section" style="position:relative;">
    <div id="cover-map" style="width:100%;height:220px;"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:40px 20px 16px;">
      <div id="detail-title" style="color:white;font-size:22px;font-weight:700;"></div>
      <div style="color:rgba(255,255,255,0.8);font-size:13px;margin-top:4px;display:flex;gap:16px;align-items:center;">
        <span id="detail-author"></span>
        <span id="detail-date"></span>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" style="margin-top:12px;">
    <div class="stat-item">
      <div class="stat-value" id="stat-days">-</div>
      <div class="stat-label">天数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-distance">-</div>
      <div class="stat-label">总里程(km)</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-elev">-</div>
      <div class="stat-label">总爬升(m)</div>
    </div>
  </div>

  <!-- Download GPX -->
  <div style="margin:16px 20px;display:none;" id="gpx-download-wrap">
    <button class="btn btn-primary" style="width:100%;" onclick="downloadCombinedGPX()">
      下载完整 GPX 路线
    </button>
  </div>

  <!-- Interactive Map -->
  <div class="section">
    <div class="section-title">骑行路线</div>
    <div class="map-container" id="map-wrap" style="position:relative;">
      <div id="map" style="height:350px;"></div>
      <button id="map-fs-btn" style="position:absolute;top:8px;right:8px;z-index:500;padding:6px 12px;border-radius:6px;border:none;background:rgba(0,0,0,0.6);color:white;font-size:13px;cursor:pointer;" onclick="toggleMapFullscreen()">全屏</button>
    </div>
    <div style="font-size:12px;color:var(--text-secondary);padding:8px 20px;">
      点击照片标记可查看大图，路线颜色代表不同天数
    </div>
  </div>

  <!-- Journey Story -->
  <div class="section">
    <div class="section-title">旅行日志</div>
    <div class="journey-content" id="journey-story"></div>
  </div>

  <!-- Route Info -->
  <div class="section" style="margin-bottom:32px;">
    <div class="section-title">行程概览</div>
    <div style="margin:0 20px;background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);">
      <div id="route-summary" style="font-size:14px;color:var(--text-secondary);line-height:1.8;"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    const journeyId = urlParams.get('id') || '1';
    const fromPage = urlParams.get('from') || 'records';

    function goBack() {
      if (fromPage === 'index') {
        location.href = 'index.html';
      } else {
        location.href = 'my-records.html';
      }
    }

    // Find journey data: first check completed journeys in localStorage, then sample data
    let journey = null;
    let isUserJourney = false;

    const completedJourneys = storage.get('completedJourneys') || [];
    const ongoingJourneys = storage.get('ongoingJourneys') || [];
    journey = completedJourneys.find(j => j.id === journeyId) || ongoingJourneys.find(j => j.id === journeyId);

    if (journey) {
      isUserJourney = true;
    } else {
      journey = SAMPLE_JOURNEYS.find(j => j.id == journeyId);
      if (!journey) {
        alert('旅程不存在');
        location.href = 'my-records.html';
        throw new Error('Journey not found');
      }
    }

    // Normalize data
    const segs = journey.segments || [];
    const totalDays = segs.length;
    const totalDist = segs.reduce((s, seg) => s + (parseFloat(seg.distance) || 0), 0);
    const totalElev = segs.reduce((s, seg) => s + (parseFloat(seg.elevation) || 0), 0);

    console.log('journey loaded:', isUserJourney ? 'user' : 'sample', 'segments:', segs.length);

    // Render edit/delete buttons for user journeys
    if (isUserJourney) {
      document.getElementById('header-actions').innerHTML = `
        <button style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;cursor:pointer;" onclick="editTitle()">编辑标题</button>
        <button style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:#e74c3c;font-size:13px;cursor:pointer;" onclick="showDeleteModal()">删除</button>
      `;
    }

    function editTitle() {
      const newTitle = prompt('修改旅程标题:', journey.title);
      if (newTitle && newTitle.trim()) {
        journey.title = newTitle.trim();
        document.getElementById('detail-title').textContent = journey.title;
        // Save back to localStorage
        const list = completedJourneys.find(j => j.id === journeyId) ? completedJourneys : ongoingJourneys;
        const idx = list.findIndex(j => j.id === journeyId);
        if (idx >= 0) {
          list[idx] = journey;
          const key = completedJourneys.find(j => j.id === journeyId) ? 'completedJourneys' : 'ongoingJourneys';
          storage.set(key, list);
        }
      }
    }

    function showDeleteModal() {
      const el = document.getElementById('delete-modal');
      if (el) el.classList.add('active');
    }

    function confirmDelete() {
      document.getElementById('delete-modal').classList.remove('active');
      // Remove from completed
      let completed = storage.get('completedJourneys') || [];
      completed = completed.filter(j => j.id !== journeyId);
      storage.set('completedJourneys', completed);
      // Remove from ongoing (just in case)
      let ongoing = storage.get('ongoingJourneys') || [];
      ongoing = ongoing.filter(j => j.id !== journeyId);
      storage.set('ongoingJourneys', ongoing);
      location.href = 'my-records.html';
    }

    // Route colors
    const colors = ['#2ecc71', '#3498db', '#e74c3c', '#f39c12', '#9b59b6', '#1abc9c'];

    // Collect all photos across segments
    const allPhotoUrls = [];
    segs.forEach(s => {
      if (s.photoUrls) allPhotoUrls.push(...s.photoUrls);
    });

    // Fill header info
    document.getElementById('detail-title').textContent = journey.title;
    if (isUserJourney) {
      document.getElementById('detail-author').textContent = '我';
      document.getElementById('detail-date').textContent = journey.completedAt || journey.createdAt;
    } else {
      document.getElementById('detail-author').textContent = journey.author;
      document.getElementById('detail-date').textContent = journey.date;
    }

    // Init cover map with real tiles
    let coverMap = null;
    let coverPoints = [];

    function initCoverMap() {
      coverMap = L.map('cover-map', {
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        tap: false,
        touchZoom: false,
        zoomControl: false,
        attributionControl: false
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: ''
      }).addTo(coverMap);
    }

    function drawCoverRoute() {
      if (!coverMap) return;
      let hasRoute = false;

      if (isUserJourney) {
        segs.forEach((seg, idx) => {
          if (seg.gpxPoints && seg.gpxPoints.length > 0) {
            const dayCoords = seg.gpxPoints.filter(p => Array.isArray(p) && p.length >= 2);
            coverPoints = coverPoints.concat(dayCoords);
            if (dayCoords.length >= 2) {
              hasRoute = true;
              const color = colors[idx % colors.length];
              L.polyline(dayCoords, {
                color: color,
                weight: 4,
                opacity: 0.9,
                lineCap: 'round',
                lineJoin: 'round'
              }).addTo(coverMap);
            }
          }
        });
      } else {
        (journey.routeCoords || []).forEach((dayCoords, idx) => {
          coverPoints = coverPoints.concat(dayCoords);
          if (dayCoords.length >= 2) {
            hasRoute = true;
            const color = colors[idx % colors.length];
            L.polyline(dayCoords, {
              color: color,
              weight: 4,
              opacity: 0.9,
              lineCap: 'round',
              lineJoin: 'round'
            }).addTo(coverMap);
          }
        });
      }

      if (coverPoints.length > 0) {
        const bounds = L.latLngBounds(coverPoints.map(p => L.latLng(p[0], p[1])));
        coverMap.fitBounds(bounds, { padding: [30, 30] });
        // Add start/end markers
        const start = coverPoints[0];
        const end = coverPoints[coverPoints.length - 1];
        if (start) {
          L.circleMarker([start[0], start[1]], { radius: 6, fillColor: '#2ecc71', color: 'white', weight: 2, fillOpacity: 1 }).addTo(coverMap);
        }
        if (end) {
          L.circleMarker([end[0], end[1]], { radius: 6, fillColor: '#e74c3c', color: 'white', weight: 2, fillOpacity: 1 }).addTo(coverMap);
        }
      }

      return hasRoute;
    }

    // Deterministic cover selection
    function getCoverUrl(j) {
      const urls = [];
      (j.segments || []).forEach(s => { if (s.photoUrls) urls.push(...s.photoUrls); });
      if (urls.length === 0) return null;
      const hash = String(j.id).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return urls[hash % urls.length];
    }

    const coverUrl = getCoverUrl(journey);

    if (coverUrl) {
      document.getElementById('cover-map').innerHTML = '';
      const img = document.createElement('img');
      img.src = coverUrl;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      document.getElementById('cover-map').appendChild(img);
    } else {
      initCoverMap();
      const hasCoverRoute = drawCoverRoute();
      if (!hasCoverRoute && !isUserJourney) {
        document.getElementById('cover-map').innerHTML = '';
        const img = document.createElement('img');
        img.src = journey.cover;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        document.getElementById('cover-map').appendChild(img);
      } else if (!hasCoverRoute) {
        coverMap.setView([36.95, 100.90], 10);
      }
    }

    document.getElementById('stat-days').textContent = totalDays;
    document.getElementById('stat-distance').textContent = totalDist > 0 ? totalDist.toFixed(1) : '-';
    document.getElementById('stat-elev').textContent = totalElev > 0 ? Math.round(totalElev) : '-';

    // Init map
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let allPoints = [];
    let allPhotoMarkers = [];

    function getPhotoList(seg) {
      if (seg.photos && seg.photos.length > 0) return seg.photos;
      if (!seg.photoUrls || seg.photoUrls.length === 0) return [];
      return seg.photoUrls.map((url, i) => {
        if (seg.gpxPoints && seg.gpxPoints.length > 0) {
          const ratio = seg.photoUrls.length <= 1 ? 0 : i / (seg.photoUrls.length - 1);
          const idx = Math.min(Math.floor(ratio * (seg.gpxPoints.length - 1)), seg.gpxPoints.length - 1);
          const pt = seg.gpxPoints[idx];
          return { url, lat: pt[0], lng: pt[1] };
        }
        const baseLat = 36.95 + (seg.day || 1) * 0.02;
        const baseLng = 100.90 + (seg.day || 1) * 0.02;
        return { url, lat: baseLat + (Math.random() - 0.5) * 0.05, lng: baseLng + (Math.random() - 0.5) * 0.05 };
      });
    }

    if (isUserJourney) {
      // 1st pass: collect all photo positions
      const allPhotoPositions = [];
      segs.forEach(seg => {
        getPhotoList(seg).forEach(p => {
          if (p.lat !== 0 || p.lng !== 0) allPhotoPositions.push(p);
        });
      });

      // 2nd pass: draw routes + place day markers away from photos
      segs.forEach((seg, idx) => {
        const color = colors[idx % colors.length];

        if (seg.gpxPoints && seg.gpxPoints.length > 0) {
          const dayCoords = seg.gpxPoints;
          allPoints = allPoints.concat(dayCoords);

          L.polyline(dayCoords, {
            color: color,
            weight: 4,
            opacity: 0.85,
            className: 'route-path'
          }).addTo(map);

          // Day marker — pick a route point not too close to any photo
          if (dayCoords.length > 0) {
            const candIdxs = [
              Math.floor(dayCoords.length * 0.15),
              Math.floor(dayCoords.length * 0.35),
              Math.floor(dayCoords.length * 0.50),
              Math.floor(dayCoords.length * 0.65),
              Math.floor(dayCoords.length * 0.85),
            ].filter(i => i >= 0 && i < dayCoords.length);
            const uniqueIdxs = [...new Set(candIdxs)];

            const dayIcon = L.divIcon({
              className: 'day-marker',
              html: `<div style="background:${color};color:white;padding:3px 11px;border-radius:16px;font-size:15px;font-weight:700;white-space:nowrap;transform:translateY(-30px);box-shadow:0 2px 8px rgba(0,0,0,0.3);">Day ${seg.day}</div>`,
              iconSize: [66, 26],
              iconAnchor: [33, 13]
            });

            let placed = false;
            for (const ci of uniqueIdxs) {
              const pos = dayCoords[ci];
              let tooClose = false;
              for (const p of allPhotoPositions) {
                const d = Math.sqrt((pos[0] - p.lat) ** 2 + (pos[1] - p.lng) ** 2);
                if (d < 0.0012) { tooClose = true; break; }
              }
              if (!tooClose) {
                L.marker(pos, { icon: dayIcon, zIndexOffset: 1000 }).addTo(map);
                placed = true;
                break;
              }
            }
            if (!placed) {
              L.marker(dayCoords[Math.floor(dayCoords.length * 0.5)], { icon: dayIcon, zIndexOffset: 1000 }).addTo(map);
            }
          }
        }

        // 3rd pass: photo markers
        getPhotoList(seg).forEach(photo => {
          if (photo.lat === 0 && photo.lng === 0) return;
          const icon = L.divIcon({
            className: 'photo-pin',
            html: `<img src="${photo.url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">`,
            iconSize: [40, 40],
            iconAnchor: [20, 40]
          });
          const marker = L.marker([photo.lat, photo.lng], { icon }).addTo(map);
          marker.on('click', () => {
            const overlay = document.querySelector('.fullscreen-overlay');
            if (overlay) {
              overlay.querySelector('img').src = photo.url;
              overlay.classList.add('active');
            }
          });
          allPhotoMarkers.push(marker);
        });
      });
    } else {
      // Sample journey
      journey.routeCoords.forEach((dayCoords, idx) => {
        const color = colors[idx % colors.length];
        allPoints = allPoints.concat(dayCoords);

        L.polyline(dayCoords, {
          color: color,
          weight: 4,
          opacity: 0.85,
          className: 'route-path'
        }).addTo(map);

        if (dayCoords.length > 0) {
          L.marker(dayCoords[0], {
            icon: L.divIcon({
              className: 'day-marker',
              html: `<div style="background:${color};color:white;padding:4px 16px;border-radius:24px;font-size:22px;font-weight:700;white-space:nowrap;">Day ${idx + 1}</div>`,
              iconSize: [100, 40],
              iconAnchor: [50, 20]
            }),
            zIndexOffset: 1000
          }).addTo(map);
        }
      });

      journey.photos.forEach(photo => {
        const icon = L.divIcon({
          className: 'photo-pin',
          html: `<img src="${photo.url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">`,
          iconSize: [40, 40],
          iconAnchor: [20, 40]
        });
        const marker = L.marker([photo.lat, photo.lng], { icon }).addTo(map);
        marker.bindPopup(`
          <div style="text-align:center;">
            <img src="${photo.url}" style="width:150px;height:100px;object-fit:cover;border-radius:8px;cursor:pointer;" data-fullscreen="${photo.url}">
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">点击查看大图</div>
          </div>
        `);
      });
    }

    // Fit map bounds
    if (allPoints.length > 0) {
      const bounds = L.latLngBounds(allPoints.map(p => L.latLng(p[0], p[1])));
      map.fitBounds(bounds, { padding: [40, 40] });
    } else {
      map.setView([36.95, 100.90], 10);
    }

    function downloadCombinedGPX() {
      const segs = journey.segments || [];
      const hasGpx = segs.some(s => s.gpxPoints && s.gpxPoints.length > 0);
      if (!hasGpx) {
        alert('该旅程没有 GPX 数据');
        return;
      }

      let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
      gpx += `<gpx version="1.1" creator="RideLog" xmlns="http://www.topografix.com/GPX/1/1">\n`;

      segs.forEach(seg => {
        if (seg.gpxPoints && seg.gpxPoints.length > 0) {
          gpx += `  <trk>\n`;
          gpx += `    <name>${(journey.title || 'RideLog Journey').replace(/[<>]/g, '')} - Day ${seg.day}</name>\n`;
          gpx += `    <trkseg>\n`;
          seg.gpxPoints.forEach(pt => {
            const lat = pt[0];
            const lon = pt[1];
            gpx += `      <trkpt lat="${lat}" lon="${lon}"></trkpt>\n`;
          });
          gpx += `    </trkseg>\n`;
          gpx += `  </trk>\n`;
        }
      });

      gpx += `</gpx>`;

      const blob = new Blob([gpx], { type: 'application/gpx+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(journey.title || 'route').replace(/\s+/g, '_')}.gpx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Show download button if GPX exists
    if (segs.some(s => s.gpxPoints && s.gpxPoints.length > 0)) {
      document.getElementById('gpx-download-wrap').style.display = 'block';
    }

    function toggleMapFullscreen() {
      const wrap = document.getElementById('map-wrap');
      const btn = document.getElementById('map-fs-btn');
      const isFs = wrap.classList.contains('map-fullscreen');
      if (!isFs) {
        wrap.classList.add('map-fullscreen');
        wrap.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1000;background:#fff;padding:0;margin:0;border-radius:0;';
        document.getElementById('map').style.height = '100%';
        btn.textContent = '退出全屏';
        btn.style.top = '12px';
        btn.style.right = '12px';
      } else {
        wrap.classList.remove('map-fullscreen');
        wrap.style.cssText = 'position:relative;';
        document.getElementById('map').style.height = '350px';
        btn.textContent = '全屏';
        btn.style.top = '8px';
        btn.style.right = '8px';
      }
      setTimeout(() => map.invalidateSize(), 100);
    }

    // Render journey story
    const storyEl = document.getElementById('journey-story');
    if (isUserJourney) {
      storyEl.innerHTML = segs.map((seg, idx) => `
        <div class="day-section">
          <div class="day-header" style="justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="day-badge">Day ${seg.day}</span>
              <span class="day-date">${seg.date}</span>
            </div>
            <button style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:12px;cursor:pointer;" onclick="event.stopPropagation();location.href='daily-segment.html?edit=1&amp;idx=${idx}&amp;day=${seg.day}&amp;journeyId=${journeyId}&amp;journey=${encodeURIComponent(journey.title)}'">编辑</button>
          </div>
          <div class="day-note">${seg.note}</div>
          ${seg.photoUrls && seg.photoUrls.length > 0 ? `
            <div class="day-photos">
              ${seg.photoUrls.map(url => `<img src="${url}" data-fullscreen="${url}">`).join('')}
            </div>
          ` : ''}
          <div style="margin-top:10px;font-size:13px;color:var(--text-secondary);">
            ${seg.distance ? `里程: ${seg.distance} km` : ''}
            ${seg.elevation ? `· 爬升: ${seg.elevation} m` : ''}
            ${seg.duration ? `· 用时: ${seg.duration}` : ''}
          </div>
        </div>
        ${idx < segs.length - 1 ? '<div class="divider" style="margin:24px 0;"></div>' : ''}
      `).join('');

      document.getElementById('route-summary').innerHTML = `
        本次旅程 <strong>${journey.title}</strong>，
        共 ${totalDays} 天，
        总里程 ${totalDist > 0 ? totalDist.toFixed(1) : '-'} km，
        总爬升 ${totalElev > 0 ? Math.round(totalElev) : '-'} m。
      `;
    } else {
      storyEl.innerHTML = journey.segments.map((seg, idx) => `
        <div class="day-section">
          <div class="day-header">
            <span class="day-badge">Day ${seg.day}</span>
            <span class="day-date">${seg.date}</span>
          </div>
          <div class="day-note">${seg.note}</div>
          ${journey.photos[idx] ? `
            <div class="day-photos">
              <img src="${journey.photos[idx].url}" data-fullscreen="${journey.photos[idx].url}">
              ${journey.photos[idx + 1] ? `<img src="${journey.photos[idx + 1].url}" data-fullscreen="${journey.photos[idx + 1].url}">` : ''}
            </div>
          ` : ''}
          <div style="margin-top:10px;font-size:13px;color:var(--text-secondary);">
            今日里程: ${seg.distance} km
            ${seg.gpxFile ? `· GPX: ${seg.gpxFile}` : ''}
          </div>
        </div>
        ${idx < journey.segments.length - 1 ? '<div class="divider" style="margin:24px 0;"></div>' : ''}
      `).join('');

      document.getElementById('route-summary').innerHTML = `
        从 <strong>${journey.start}</strong> 出发，
        经 ${journey.days} 天骑行，
        总里程 ${journey.distance} km，
        最终抵达 <strong>${journey.end}</strong>。
      `;
    }
  </script>
</body>
</html>
