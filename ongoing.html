<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅程进行中 - RideLog</title>
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login-modal.js"></script>
</head>
<body class="page-no-nav" style="padding-bottom:20px;">
  <!-- Page Header -->
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">&#8249;</button>
    <div class="page-title">旅程进行中</div>
    <button style="margin-left:auto;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:#e74c3c;font-size:13px;cursor:pointer;" onclick="showDeleteJourneyModal()">删除</button>
    <button style="margin-left:8px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;cursor:pointer;" onclick="endJourney()">
      结束旅程
    </button>
  </div>

  <!-- Modal: Delete Journey Confirmation -->
  <div class="modal-overlay" id="delete-journey-modal">
    <div class="modal">
      <div class="modal-title">删除旅程</div>
      <div class="modal-desc">确定要删除这个旅程吗？所有每日记录和照片都会被删除，此操作不可恢复。</div>
      <div class="action-row" style="margin:0;">
        <button class="btn btn-secondary" onclick="document.getElementById('delete-journey-modal').classList.remove('active')">取消</button>
        <button class="btn btn-accent" onclick="confirmDeleteJourney()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Journey Title -->
  <div style="background:var(--surface);padding:20px;text-align:center;border-bottom:1px solid var(--border);">
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">ONGOING JOURNEY</div>
    <div style="font-size:22px;font-weight:700;color:var(--text);" id="journey-title">--</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:6px;" id="journey-meta">--</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" style="margin-top:12px;">
    <div class="stat-item">
      <div class="stat-value" id="stat-days">0</div>
      <div class="stat-label">已记录天数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-gpx">0</div>
      <div class="stat-label">GPX路线</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-distance">0</div>
      <div class="stat-label">总里程(km)</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-elev">0</div>
      <div class="stat-label">总爬升(m)</div>
    </div>
  </div>

  <!-- Daily Segments List -->
  <div class="section">
    <div class="section-title">每日记录</div>
    <div id="segments-list"></div>
  </div>

  <!-- Add Segment Button -->
  <div style="margin:16px 20px;">
    <button class="btn btn-primary" style="width:100%;" onclick="addSegment()">
      + 添加 Day <span id="next-day">1</span> 记录
    </button>
  </div>

  <!-- Modal: End Journey Confirmation -->
  <div class="modal-overlay" id="end-modal">
    <div class="modal">
      <div class="modal-title">&#127942; 结束旅程</div>
      <div class="modal-desc">结束旅程后，系统会将所有每日记录合并成一篇精美的旅行日志。确定要结束吗？</div>
      <div class="action-row" style="margin:0;">
        <button class="btn btn-secondary" onclick="document.getElementById('end-modal').classList.remove('active')">继续记录</button>
        <button class="btn btn-accent" onclick="confirmEndJourney()">确认结束</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/journey-service.js"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    const journeyId = urlParams.get('id');
    const fromPage = urlParams.get('from') || 'records';

    function goBack() {
      if (fromPage === 'index') {
        location.href = 'index.html';
      } else {
        location.href = 'my-records.html';
      }
    }

    let journey = null;

    async function loadJourney() {
      if (!journeyId) {
        alert('缺少旅程 ID');
        location.href = 'my-records.html';
        return;
      }

      try {
        journey = await window.journeyService.getJourneySummary(journeyId);
      } catch (err) {
        console.error('[ongoing] load journey error:', err);
      }

      if (!journey) {
        alert('旅程不存在');
        location.href = 'my-records.html';
        return;
      }

      document.getElementById('journey-title').textContent = journey.title;
      document.getElementById('journey-meta').textContent = `创建于 ${journey.createdAt}`;
      renderSegments();
    }

    function renderSegments() {
      const segs = journey.segments || [];
      console.log('renderSegments, count:', segs.length, 'data:', segs);

      document.getElementById('stat-days').textContent = segs.length;
      document.getElementById('stat-gpx').textContent = segs.filter(s => s.gpx).length;
      const totalDist = segs.reduce((s, seg) => s + (parseFloat(seg.distance) || 0), 0);
      document.getElementById('stat-distance').textContent = totalDist > 0 ? Math.round(totalDist) : 0;
      const totalElev = segs.reduce((s, seg) => s + (parseFloat(seg.elevation) || 0), 0);
      document.getElementById('stat-elev').textContent = totalElev > 0 ? Math.round(totalElev) : 0;
      document.getElementById('next-day').textContent = segs.length + 1;

      const listEl = document.getElementById('segments-list');
      if (segs.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state" style="padding:40px 20px;">
            <div class="empty-icon">&#128197;</div>
            <div class="empty-title">还没有每日记录</div>
            <div class="empty-desc">点击下方按钮添加你的第一天骑行记录</div>
          </div>
        `;
        return;
      }

      listEl.innerHTML = segs.map((seg, i) => ({ seg, i }))
        .reverse()
        .map(({ seg, i }) => {
        try {
          // Normalize old data format
          const photoCount = seg.photoCount !== undefined ? seg.photoCount : (seg.photos || 0);
          const photoUrls = seg.photoUrls || [];
          const gpxPoints = seg.gpxPoints || [];
          const hasGpx = seg.gpx || (gpxPoints.length > 0);

          // Build images: route snapshot first, then photos
          const images = [];

          // Route snapshot (always present if GPX)
          if (seg.routeSvg || (hasGpx && gpxPoints.length > 0)) {
            const svg = seg.routeSvg || generateRouteSvg(gpxPoints);
            console.log('[renderSegments] routeSvg length:', (seg.routeSvg || '').length, 'fallback:', !seg.routeSvg, 'svg length:', (svg || '').length);
            if (svg) images.push(svg);
          }

          // Photos (up to 7, route takes 1 slot, total 8 max)
          if (photoUrls.length > 0) {
            photoUrls.slice(0, 7).forEach(url => {
              images.push(`<img src="${url}" style="width:100%;aspect-ratio:1;border-radius:8px;object-fit:cover;display:block;" data-fullscreen="${url}">`);
            });
          }

          return `
            <div class="card" style="margin:12px 20px;cursor:pointer;" onclick="location.href='daily-segment.html?edit=1&amp;idx=${i}&amp;day=${seg.day}&amp;journeyId=${journeyId}&amp;journey=${encodeURIComponent(journey.title)}'">
              <div class="card-content">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                  <div class="segment-day" style="width:40px;height:40px;">
                    <div class="day-num" style="font-size:16px;">${seg.day}</div>
                    <div class="day-label">DAY</div>
                  </div>
                  <div style="flex:1;">
                    <div style="font-weight:700;font-size:15px;">${seg.date}</div>
                    <div style="display:flex;gap:10px;margin-top:3px;">
                      ${seg.distance ? `<span style="font-size:12px;color:var(--text-secondary);">${Math.round(seg.distance)} km</span>` : ''}
                      ${seg.elevation ? `<span style="font-size:12px;color:var(--text-secondary);">↑ ${Math.round(seg.elevation)}m</span>` : ''}
                      ${seg.duration ? `<span style="font-size:12px;color:var(--text-secondary);">${seg.duration}</span>` : ''}
                    </div>
                  </div>
                  <span style="font-size:12px;color:var(--text-secondary);">&#9998; 编辑</span>
                </div>
                <div style="font-size:14px;color:var(--text);line-height:1.6;margin-bottom:12px;">${seg.note}</div>
                ${images.length > 0 ? `
                  <div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;">
                    ${images.join('')}
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        } catch (e) {
          console.error('Error rendering segment', i, e);
          return `<div style="padding:16px;color:red;">Day ${seg.day} 渲染出错</div>`;
        }
      }).join('');
    }

    loadJourney();

    function addSegment() {
      const nextDay = (journey?.segments || []).length + 1;
      location.href = `daily-segment.html?day=${nextDay}&journeyId=${journey.id}&journey=${encodeURIComponent(journey.title)}`;
    }

    function showDeleteJourneyModal() {
      document.getElementById('delete-journey-modal').classList.add('active');
    }

    async function confirmDeleteJourney() {
      document.getElementById('delete-journey-modal').classList.remove('active');

      try {
        await window.journeyService.deleteJourney(journeyId);
        alert('旅程已删除');
        location.href = 'my-records.html';
      } catch (err) {
        alert('删除旅程失败：' + err.message);
      }
    }

    function endJourney() {
      const segs = journey?.segments || [];
      if (segs.length === 0) {
        alert('至少添加一天的记录才能结束旅程');
        return;
      }
      document.getElementById('end-modal').classList.add('active');
    }

    async function confirmEndJourney() {
      document.getElementById('end-modal').classList.remove('active');

      try {
        await window.journeyService.endJourney(journeyId);
        alert('旅程已结束！正在生成旅行日志...');
        location.href = `journey-detail.html?id=${journeyId}&completed=1&from=records`;
      } catch (err) {
        alert('结束旅程失败：' + err.message);
      }
    }
  </script>
</body>
</html>
